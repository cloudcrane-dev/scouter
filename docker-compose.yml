services:
  postgres:
    image: postgres:16-alpine
    container_name: scouter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scouter
      POSTGRES_USER: scouter
      POSTGRES_PASSWORD: scouter
    ports:
      - "55432:5432"
    volumes:
      - scouter_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scouter -d scouter"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  scouter_pg_data:
